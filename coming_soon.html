<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Under Construction | KEEJAH Mwandu</title>
  <!-- Bootstrap 5 + Icons + Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #0f2027);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      color: white;
      position: relative;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* animated construction cones / tools in background */
    .floating-tool {
      position: absolute;
      opacity: 0.1;
      font-size: 5rem;
      user-select: none;
      pointer-events: none;
      z-index: 0;
    }

    .tool-1 { top: 10%; left: 5%; animation: float 8s infinite; }
    .tool-2 { bottom: 15%; right: 8%; animation: float 10s infinite reverse; }
    .tool-3 { top: 25%; right: 15%; animation: float 12s infinite; }
    .tool-4 { bottom: 20%; left: 10%; animation: float 9s infinite; }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .content {
      position: relative;
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 3rem 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,215,0,0.3) inset;
      border: 1px solid rgba(255,255,255,0.2);
      max-width: 700px;
      width: 90%;
      margin: 20px;
    }

    h1 {
      font-size: 4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 5px;
      text-shadow: 0 0 10px #ffaa00, 0 0 20px #ffaa00, 0 0 30px #ffaa00;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0% { opacity: 1; text-shadow: 0 0 10px #ffaa00, 0 0 20px #ffaa00; }
      50% { opacity: 0.9; text-shadow: 0 0 5px #ffaa00, 0 0 15px #ffaa00; }
      100% { opacity: 1; text-shadow: 0 0 10px #ffaa00, 0 0 20px #ffaa00; }
    }

    .subtitle {
      font-size: 1.4rem;
      margin: 20px 0;
      font-weight: 300;
      background: rgba(255,255,255,0.15);
      padding: 10px 20px;
      border-radius: 50px;
      display: inline-block;
      backdrop-filter: blur(4px);
    }

    .progress-container {
      width: 100%;
      margin: 30px 0;
    }

    .progress {
      height: 25px;
      border-radius: 30px;
      background: rgba(255,255,255,0.2);
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .progress-bar {
      background: linear-gradient(90deg, #f9d423, #fdaa33, #f96d00);
      width: 67%; /* example progress */
      font-weight: bold;
      font-size: 0.9rem;
      line-height: 25px;
      padding-left: 10px;
      text-align: left;
      color: #111;
      position: relative;
      overflow: visible;
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }

    .progress-bar-striped {
      background-size: 40px 40px;
    }

    .countdown {
      font-size: 2.5rem;
      font-weight: 600;
      margin: 20px 0;
    }

    .countdown span {
      background: rgba(255,255,255,0.2);
      padding: 10px 15px;
      border-radius: 20px;
      margin: 0 5px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 5px 10px rgba(0,0,0,0.3);
    }

    .btn-glow {
      background: white;
      color: #203a43;
      font-weight: 600;
      padding: 12px 40px;
      border-radius: 50px;
      font-size: 1.3rem;
      box-shadow: 0 0 20px #ffaa00, 0 0 40px #ffaa00;
      transition: all 0.3s;
      border: none;
    }

    .btn-glow:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px #ffcc00, 0 0 60px #ffaa00;
      background: #f0f0f0;
    }

    .social-icons {
      margin-top: 30px;
    }

    .social-icons a {
      color: white;
      font-size: 2rem;
      margin: 0 15px;
      transition: 0.3s;
      display: inline-block;
    }

    .social-icons a:hover {
      transform: translateY(-5px);
      color: #ffaa00;
    }

    footer {
      margin-top: 30px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <!-- floating construction icons -->
  <div class="floating-tool tool-1"><i class="fas fa-hard-hat"></i></div>
  <div class="floating-tool tool-2"><i class="fas fa-tools"></i></div>
  <div class="floating-tool tool-3"><i class="fas fa-draw-polygon"></i></div>
  <div class="floating-tool tool-4"><i class="fas fa-paint-roller"></i></div>

  <div class="content text-center">
    <h1>
      <i class="fas fa-gear fa-spin me-2" style="--fa-animation-duration: 3s;"></i>
      UNDER CONSTRUCTION
      <i class="fas fa-gear fa-spin ms-2" style="--fa-animation-duration: 3s;"></i>
    </h1>

    <div class="subtitle">
      <i class="fas fa-hard-hat me-2"></i> KEEJAH Mwandu – Building something awesome
    </div>

    <p class="lead">
      This page is currently being developed. Stay tuned for a powerful launch!
    </p>

    <!-- progress bar -->
    <div class="progress-container">
      <div class="progress">
        <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 75%">75% ready</div>
      </div>
      <p class="mt-2 small opacity-75">Launching soon – estimated completion: 2 weeks</p>
    </div>

    <!-- fake countdown timer (static, could be dynamic with JS) -->
    <div class="countdown">
      <span>14</span> <span>:</span> <span>08</span> <span>:</span> <span>32</span> <span>:</span> <span>19</span>
      <div class="small text-uppercase mt-1">days : hours : mins : secs</div>
    </div>

    <a href="mailto:keejahmwandu783@gmail.com" class="btn btn-glow mt-3">
      <i class="fas fa-envelope me-2"></i> Contact Me
    </a>

    <!-- social links (optional) -->
    <div class="social-icons">
      <a href="#" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="#" target="_blank"><i class="fab fa-github"></i></a>
      <a href="#" target="_blank"><i class="fab fa-twitter"></i></a>
    </div>

    <footer>
      <i class="fas fa-code me-1"></i> Built with Bootstrap & Font Awesome
    </footer>
  </div>

  <!-- Optional: Add real countdown timer JS if desired -->
</body>
</html>
